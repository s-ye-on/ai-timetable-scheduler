spring.datasource.url=jdbc:h2:mem:timetable-scheduler;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.jwt.issuer=timetable-scheduler-test
app.jwt.secret=test-secret-key-test-secret-key-test-secret-key
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=1800
